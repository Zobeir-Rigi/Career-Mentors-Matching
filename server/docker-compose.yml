services:
  postgres:
    image: postgres:16-alpine
    container_name: mentor-matching-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentor-matching
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentor-matching"]
      interval: 5s
      timeout: 5s
      retries: 5 
volumes:
  postgres_data:

